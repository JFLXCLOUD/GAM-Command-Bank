<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAM Command Bank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="starfield-background" class="starfield-background"></div>

    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="header-accent"></div>
            <span class="header-title">GAM Command Bank</span>
            <span class="header-version">v3</span>
            <div class="header-right">
                <span class="search-icon">⌕</span>
                <input class="search-input" id="searchInput" type="text" placeholder="Search commands…" autocomplete="off">
                <button class="search-clear" id="searchClear" title="Clear search">✕</button>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">☽</button>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="gam">◈ GAM <span class="tab-count" id="gam-count"></span></button>
            <button class="tab-btn" data-tab="ad">⊞ AD <span class="tab-count" id="ad-count"></span></button>
            <button class="tab-btn" data-tab="powershell">⌨ PS <span class="tab-count" id="ps-count"></span></button>
        </nav>

        <!-- Content -->
        <main class="main-content">

            <!-- GAM Tab -->
            <div class="tab-content active" id="gam-tab">
                <div class="card">
                    <div class="card-accent"></div>
                    <div class="card-inner">
                        <div class="selector-row">
                            <select id="gam-select" class="cmd-select" onchange="app.onSelectChange('gam')">
                                <option value="">Choose a command…</option>
                            </select>
                            <button class="fav-btn" id="gam-fav" onclick="app.toggleFavorite('gam')" title="Toggle favorite">☆</button>
                            <button class="icon-btn danger" onclick="app.removeCommand('gam')" title="Remove selected">⌫</button>
                            <button class="icon-btn ghost" onclick="app.toggleAddPanel('gam')" title="Add new command">＋</button>
                            <a href="https://sites.google.com/view/gam--commands/home" target="_blank" class="docs-link">↗ Docs</a>
                        </div>
                        <div class="add-panel" id="gam-add-panel">
                            <div class="add-panel-inner">
                                <div class="add-row">
                                    <span class="add-label">Command</span>
                                    <input type="text" id="gam-command" class="text-input mono" placeholder="gam user &lt;user&gt; suspended on">
                                </div>
                                <div class="add-row">
                                    <span class="add-label">Description</span>
                                    <input type="text" id="gam-description" class="text-input" placeholder="Brief description">
                                </div>
                                <div class="add-row">
                                    <button class="btn success" onclick="app.addCommand('gam')">＋ Save</button>
                                    <span class="add-hint">Use &lt;placeholder&gt; for variable fields</span>
                                </div>
                            </div>
                        </div>
                        <div class="params-section" id="gam-params"></div>
                        <div class="output-wrap">
                            <textarea id="gam-output" class="output-area" readonly placeholder="Select a command to get started…"></textarea>
                        </div>
                        <div class="action-row">
                            <button class="btn primary" onclick="app.copyCommand('gam')">⎘ Copy</button>
                            <button class="btn success" onclick="app.executeCommand('gam')">▶ Execute</button>
                            <button class="btn warning" onclick="app.clearOutput('gam')">⊘ Clear</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AD Tab -->
            <div class="tab-content" id="ad-tab">
                <div class="card">
                    <div class="card-accent"></div>
                    <div class="card-inner">
                        <div class="selector-row">
                            <select id="ad-select" class="cmd-select" onchange="app.onSelectChange('ad')">
                                <option value="">Choose a command…</option>
                            </select>
                            <button class="fav-btn" id="ad-fav" onclick="app.toggleFavorite('ad')" title="Toggle favorite">☆</button>
                            <button class="icon-btn danger" onclick="app.removeCommand('ad')" title="Remove selected">⌫</button>
                            <button class="icon-btn ghost" onclick="app.toggleAddPanel('ad')" title="Add new command">＋</button>
                        </div>
                        <div class="add-panel" id="ad-add-panel">
                            <div class="add-panel-inner">
                                <div class="add-row">
                                    <span class="add-label">Command</span>
                                    <input type="text" id="ad-command" class="text-input mono" placeholder="Get-ADUser -Identity &lt;user&gt;">
                                </div>
                                <div class="add-row">
                                    <span class="add-label">Description</span>
                                    <input type="text" id="ad-description" class="text-input" placeholder="Brief description">
                                </div>
                                <div class="add-row">
                                    <button class="btn success" onclick="app.addCommand('ad')">＋ Save</button>
                                    <span class="add-hint">Use &lt;placeholder&gt; for variable fields</span>
                                </div>
                            </div>
                        </div>
                        <div class="params-section" id="ad-params"></div>
                        <div class="output-wrap">
                            <textarea id="ad-output" class="output-area" readonly placeholder="Select a command to get started…"></textarea>
                        </div>
                        <div class="action-row">
                            <button class="btn primary" onclick="app.copyCommand('ad')">⎘ Copy</button>
                            <button class="btn success" onclick="app.executeCommand('ad')">▶ Execute</button>
                            <button class="btn warning" onclick="app.clearOutput('ad')">⊘ Clear</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PowerShell Tab -->
            <div class="tab-content" id="powershell-tab">
                <div class="card">
                    <div class="card-accent"></div>
                    <div class="card-inner">
                        <div class="selector-row">
                            <select id="powershell-select" class="cmd-select" onchange="app.onSelectChange('powershell')">
                                <option value="">Choose a command…</option>
                            </select>
                            <button class="fav-btn" id="powershell-fav" onclick="app.toggleFavorite('powershell')" title="Toggle favorite">☆</button>
                            <button class="icon-btn danger" onclick="app.removeCommand('powershell')" title="Remove selected">⌫</button>
                            <button class="icon-btn ghost" onclick="app.toggleAddPanel('powershell')" title="Add new command">＋</button>
                        </div>
                        <div class="add-panel" id="powershell-add-panel">
                            <div class="add-panel-inner">
                                <div class="add-row">
                                    <span class="add-label">Command</span>
                                    <input type="text" id="powershell-command" class="text-input mono" placeholder="Get-Process -Name &lt;process_name&gt;">
                                </div>
                                <div class="add-row">
                                    <span class="add-label">Description</span>
                                    <input type="text" id="powershell-description" class="text-input" placeholder="Brief description">
                                </div>
                                <div class="add-row">
                                    <button class="btn success" onclick="app.addCommand('powershell')">＋ Save</button>
                                    <span class="add-hint">Use &lt;placeholder&gt; for variable fields</span>
                                </div>
                            </div>
                        </div>
                        <div class="params-section" id="powershell-params"></div>
                        <div class="output-wrap">
                            <textarea id="powershell-output" class="output-area" readonly placeholder="Select a command to get started…"></textarea>
                        </div>
                        <div class="action-row">
                            <button class="btn primary" onclick="app.copyCommand('powershell')">⎘ Copy</button>
                            <button class="btn success" onclick="app.executeCommand('powershell')">▶ Execute</button>
                            <button class="btn warning" onclick="app.clearOutput('powershell')">⊘ Clear</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="status-text">● Ready</span>
            <span id="total-count"></span>
        </footer>

    </div>

    <script src="starfield.js"></script>
    <script src="app.js"></script>
</body>
</html>
